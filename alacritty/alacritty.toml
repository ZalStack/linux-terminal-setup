[general]
live_config_reload = true

[terminal]
shell = { program = "/usr/bin/zsh", args = ["-l"] }

[window]
decorations = "None"
startup_mode = "Windowed"
opacity = 0.94
blur = true
padding = { x = 20, y = 20 }
dimensions = { columns = 60, lines = 20 }
resize_increments = true

[font]
size = 9.0
builtin_box_drawing = true
offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }

normal = { family = "MesloLGS NF", style = "Regular" }
bold = { family = "MesloLGS NF", style = "Bold" }
italic = { family = "MesloLGS NF", style = "Italic" }
bold_italic = { family = "MesloLGS NF", style = "Bold Italic" }

[colors]

# =========================================
# PRIMARY
# =========================================
[colors.primary]
background = "#1e1f22"
foreground = "#d4d4d4"

# =========================================
# CURSOR
# =========================================
[colors.cursor]
text = "#1e1f22"
cursor = "#d8c092"

# =========================================
# VI MODE CURSOR
# =========================================
[colors.vi_mode_cursor]
text = "#1e1f22"
cursor = "#c5c8c6"
[general]
live_config_reload = true

[terminal]
shell = { program = "/usr/bin/zsh", args = ["-l"] }

[window]
decorations = "None"
startup_mode = "Windowed"
opacity = 0.94
blur = true
padding = { x = 20, y = 20 }
dimensions = { columns = 60, lines = 20 }
resize_increments = true

[font]
size = 9.0
builtin_box_drawing = true
offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }

normal = { family = "MesloLGS NF", style = "Regular" }
bold = { family = "MesloLGS NF", style = "Bold" }
italic = { family = "MesloLGS NF", style = "Italic" }
bold_italic = { family = "MesloLGS NF", style = "Bold Italic" }

[colors]

# =========================================
# PRIMARY
# =========================================
[colors.primary]
background = "#1e1f22"
foreground = "#d4d4d4"

# =========================================
# CURSOR
# =========================================
[colors.cursor]
text = "#1e1f22"
cursor = "#d8c092"

# =========================================
# VI MODE CURSOR
# =========================================
[colors.vi_mode_cursor]
text = "#1e1f22"
cursor = "#c5c8c6"

# =========================================
# SELECTION
# =========================================
[colors.selection]
text = "#ffffff"
background = "#3a3d41"

# =========================================
# SEARCH
# =========================================
[colors.search.matches]
foreground = "#000000"
background = "#d8c092"

# =========================================
# NORMAL COLORS
# =========================================
[colors.normal]
black   = "#2b2d30"
red     = "#e06c75"
green   = "#98c379"
yellow  = "#e5c07b"
blue    = "#61afef"
magenta = "#c678dd"
cyan    = "#56b6c2"
white   = "#d4d4d4"

# =========================================
# BRIGHT COLORS
# =========================================
[colors.bright]
black   = "#3a3d41"
red     = "#f07178"
green   = "#a9dc76"
yellow  = "#f2cc60"
blue    = "#82aaff"
magenta = "#d4a5f9"
cyan    = "#89ddff"
white   = "#ffffff"

# =========================================
# HINTS / LINKS
# =========================================
[colors.hints.start]
foreground = "#1e1f22"
background = "#8ab4f8"

[colors.hints.end]
foreground = "#1e1f22"
background = "#8ab4f8"

[cursor]
style = { shape = "Block", blinking = "On" }
unfocused_hollow = true
blink_interval = 750

[selection]
save_to_clipboard = true

[scrolling]
history = 10000
multiplier = 3

[mouse]
hide_when_typing = true


# ====================================================
# KEYBOARD BINDINGS WITH ZOOM SUPPORT
# ====================================================
[keyboard]
bindings = [
  # ZOOM IN - Ctrl + Plus and Ctrl + Equals
  { key = "Plus",    mods = "Control", action = "IncreaseFontSize" },
  { key = "Equals",  mods = "Control", action = "IncreaseFontSize" },
  { key = "Plus",    mods = "Control|Shift", action = "IncreaseFontSize" },
  { key = "Equals",  mods = "Control|Shift", action = "IncreaseFontSize" },
  
  # ZOOM OUT - Ctrl + Minus
  { key = "Minus",   mods = "Control", action = "DecreaseFontSize" },
  { key = "Minus",   mods = "Control|Shift", action = "DecreaseFontSize" },
  
  # RESET ZOOM - Ctrl + 0
  { key = "Key0",    mods = "Control", action = "ResetFontSize" },
  { key = "Numpad0", mods = "Control", action = "ResetFontSize" },
  
  # COPY & PASTE
  { key = "C", mods = "Shift", action = "Copy" },
  { key = "V", mods = "Shift", action = "Paste" },
  
  # SCROLLING
  { key = "PageUp",   mods = "Shift", action = "ScrollPageUp" },
  { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
  { key = "Up", mods = "Shift", action = "ScrollLineUp" },
  { key = "Down", mods = "Shift", action = "ScrollLineDown" },
  
  # VI MODE
  { key = "V", mods = "Control", action = "ToggleViMode" },
  
  # WINDOW CONTROLS
  { key = "F", mods = "Control|Shift", action = "ToggleFullscreen" },
  { key = "T", mods = "Control|Shift", action = "SpawnNewInstance" },
  { key = "W", mods = "Control|Shift", action = "Quit" }
]


