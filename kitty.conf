# === Performa ===
sync_to_monitor      yes
repaint_delay        8
input_delay          2

# === Shell ===
shell                /usr/bin/zsh -l

# === Window ===
hide_window_decorations  titlebar-only
window_padding_width     24
background_opacity       0.92
background_blur          64
dynamic_background_opacity yes
remember_window_size     yes

# === Font ===
font_family          MesloLGS NF Regular
bold_font            MesloLGS NF Bold
italic_font          MesloLGS NF Italic
bold_italic_font     MesloLGS NF Bold Italic
font_size            12.5
adjust_line_height   2

# === Cursor ===
cursor_shape         block
cursor_blink_interval  0.5
cursor_stop_blinking_after 0
cursor_trail         3
cursor_trail_decay   0.1 0.4

# === Scrollback ===
scrollback_lines     10000
wheel_scroll_multiplier 5.0

# === Warna ===
background           #1e1f22
foreground           #d4d4d4
cursor               #d8c092
cursor_text_color    #1e1f22
selection_background #404244
selection_foreground #ffffff
url_color            #8ab4f8

# normal colors
color0  #2b2d30    color8   #3a3d41
color1  #e06c75    color9   #f07178
color2  #98c379    color10  #a9dc76
color3  #e5c07b    color11  #f2cc60
color4  #61afef    color12  #82aaff
color5  #c678dd    color13  #d4a5f9
color6  #56b6c2    color14  #89ddff
color7  #d4d4d4    color15  #ffffff

# === Keybindings ===
map ctrl+equal       change_font_size all +1.0
map ctrl+minus       change_font_size all -1.0
map ctrl+0           change_font_size all 0
map shift+c          copy_to_clipboard
map shift+v          paste_from_clipboard
map shift+page_up    scroll_page_up
map shift+page_down  scroll_page_down
map ctrl+shift+f     toggle_fullscreen
map ctrl+shift+t     new_window
map ctrl+shift+w     close_window

# === Bell ===
visual_bell_duration 0.0
enable_audio_bell    no
